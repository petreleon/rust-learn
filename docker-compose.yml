services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      ETH_HOST: anvil
      ETH_PORT: "8545"
    volumes:
      - .:/usr/src/app
      - cargo_disk:/usr/local/cargo
    depends_on:
      - db
      - anvil
      - rustfs
    # Use the app entrypoint script which:
    # - initializes git submodules
    # - if PROD_MODE=TRUE runs diesel migrations and starts the app
    # - otherwise sleeps indefinitely to keep the container alive
    command: /usr/src/app/scripts/app-entrypoint.sh

  db:
    image: postgres:latest
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "5433:5432"

  rustfs:
    image: rustfs/rustfs:latest
    container_name: rustfs-server
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - RUSTFS_VOLUMES=/data/rustfs{0..3}
      - RUSTFS_ADDRESS=0.0.0.0:9000
      - RUSTFS_CONSOLE_ADDRESS=0.0.0.0:9001
      - RUSTFS_CONSOLE_ENABLE=true
      - RUSTFS_ACCESS_KEY=${S3_ACCESS_KEY}
      - RUSTFS_SECRET_KEY=${S3_SECRET_KEY}
    volumes:
      - rustfs_data:/data
    restart: unless-stopped

  anvil:
    image: ghcr.io/foundry-rs/foundry:nightly
    entrypoint: ["/anvil-entrypoint.sh"]
    env_file:
      - .env
    environment:
      ANVIL_IP_ADDR: 0.0.0.0
    ports:
      - "8545:8545"
    volumes:
      - anvil_state:/anvil
      - ./scripts/anvil-entrypoint.sh:/anvil-entrypoint.sh:ro
    user: root
    stop_signal: SIGINT
    stop_grace_period: 15s

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    env_file:
      - .env
    environment:
      # concurrency for ffmpeg workers (default 1)
      WORKER_CONCURRENCY: "1"
      # retry/backoff configuration
      WORKER_MAX_ATTEMPTS: "5"
      WORKER_BASE_BACKOFF_SECONDS: "60"
    volumes:
      - .:/usr/src/app
      - cargo_disk:/usr/local/cargo
    depends_on:
      - db
      - rustfs
    # Run the prebuilt worker binary in the image (avoid building in the container)
    command: /usr/local/bin/worker
    restart: unless-stopped
    stop_signal: SIGTERM
    stop_grace_period: 2m
    healthcheck:
      # Escape $ to avoid Compose env interpolation; compute file mtime delta < 120s
      test: ["CMD-SHELL", "if [ -f /tmp/worker_alive ]; then last=$$(stat -c %Y /tmp/worker_alive); now=$$(date +%s); diff=$$((now-last)); if [ $$diff -lt 120 ]; then exit 0; else exit 1; fi; else exit 1; fi"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M

volumes:
  postgres_data:
  cargo_disk:
  rustfs_data:
  anvil_state:
