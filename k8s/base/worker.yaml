apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: rust-learn
  labels:
    app: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: rust-app:latest
          imagePullPolicy: Never
          command: ["/usr/local/bin/worker"]
          envFrom:
            - configMapRef:
                name: worker-config
            - configMapRef:
                name: app-config
            - secretRef:
                name: postgres-secret
            - secretRef:
                name: app-secrets
            - secretRef:
                name: s3-secret
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: DATABASE_URL
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - |
                  if [ -f /tmp/worker_alive ]; then
                    last=$(stat -c %Y /tmp/worker_alive)
                    now=$(date +%s)
                    diff=$((now-last))
                    if [ $diff -lt 120 ]; then
                      exit 0
                    else
                      exit 1
                    fi
                  else
                    exit 1
                  fi
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: worker
  namespace: rust-learn
spec:
  selector:
    app: worker
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
