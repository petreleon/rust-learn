apiVersion: apps/v1
kind: Deployment
metadata:
  name: rust-app
  namespace: rust-learn
  labels:
    app: rust-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rust-app
  template:
    metadata:
      labels:
        app: rust-app
    spec:
      initContainers:
        - name: migrate
          image: rust-app:latest
          imagePullPolicy: Never
          command: ["diesel", "migration", "run"]
          envFrom:
            - secretRef:
                name: postgres-secret
            - secretRef:
                name: app-secrets
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: DATABASE_URL
      containers:
        - name: rust-app
          image: rust-app:latest
          imagePullPolicy: Never
          command: ["/usr/src/app/scripts/app-entrypoint.sh"]
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: postgres-secret
            - secretRef:
                name: app-secrets
            - secretRef:
                name: s3-secret
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: DATABASE_URL
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: rust-app
  namespace: rust-learn
spec:
  selector:
    app: rust-app
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: rust-app-external
  namespace: rust-learn
spec:
  selector:
    app: rust-app
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
  type: NodePort
